<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>DAEU Révisions — Little Genius</title>
<!--
  ╔═══════════════════════════════════════════════════════════╗
  ║  CHOIX TECHNIQUES                                        ║
  ╠═══════════════════════════════════════════════════════════╣
  ║                                                           ║
  ║  Algorithme SRS : SM-2 (SuperMemo 2) retenu plutôt que    ║
  ║  FSRS car il est éprouvé (30+ ans), simple à implémenter  ║
  ║  sans serveur, et parfaitement adapté à un usage local.   ║
  ║  Ease factor min 1.3, intervalles 1→3→n*EF jours.         ║
  ║                                                           ║
  ║  Librairies : zéro. Confetti = Canvas natif (~45 lignes). ║
  ║  Graphes = barres CSS + canvas sparkline. Pas de CDN.     ║
  ║                                                           ║
  ║  Structure localStorage (clé "daeu") :                    ║
  ║  { decks[], cs{}, stats{}, settings{} }                   ║
  ║  decks = contenu (cartes front/back + fiches textuelles). ║
  ║  cs = card states SM-2 séparés ({ef, ivl, reps, due}).    ║
  ║                                                           ║
  ║  Typo : Georgia (titres), system-ui (corps), Consolas     ║
  ║  (mono). Tout offline, zéro appel réseau.                 ║
  ║                                                           ║
  ║  UX : bottom-tab nav native, swipe via Touch Events,      ║
  ║  confetti/shake feedback, dark mode auto (prefers-color-   ║
  ║  scheme) + toggle persisté, timer optionnel par carte.     ║
  ║  Premier rendu < 100ms (DOM minimal + innerHTML direct).  ║
  ║                                                           ║
  ╚═══════════════════════════════════════════════════════════╝
-->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{overflow:hidden;height:100dvh;height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}

:root{
  --bg:#0a0e17;--s1:#131820;--s2:#1c2130;--s3:#252b3b;
  --tx1:#e8eaed;--tx2:#9ca3af;--tx3:#6b7280;--brd:#2a3040;
  --eng:#e06c75;--fr1:#61afef;--fr2:#c678dd;--geo:#98c379;--hist:#d19a66;--new:#56b6c2;
  --fd:Georgia,'Palatino Linotype','Book Antiqua',serif;
  --fb:system-ui,'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  --fm:'Cascadia Code',Consolas,'Courier New',monospace;
  --r:14px;--sh:0 4px 24px rgba(0,0,0,.4);
  --ease:cubic-bezier(.4,0,.2,1);--dur:.3s;
  --nav:64px;--top:52px;
}
[data-theme="light"]{
  --bg:#f0f2f5;--s1:#fff;--s2:#f5f6f8;--s3:#e9ebef;
  --tx1:#1a1a2e;--tx2:#64748b;--tx3:#94a3b8;--brd:#d1d5db;
  --sh:0 4px 24px rgba(0,0,0,.08);
}
body{font-family:var(--fb);color:var(--tx1);background:var(--bg);
  font-size:clamp(.875rem,2.4vw,1.05rem);line-height:1.55;
  display:flex;flex-direction:column;
  transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}

/* TOP BAR */
.top{height:var(--top);display:flex;align-items:center;padding:0 16px;gap:10px;
  background:var(--s1);border-bottom:1px solid var(--brd);flex-shrink:0;z-index:100;position:relative}
.top h1{font-family:var(--fd);font-size:clamp(.95rem,2.8vw,1.2rem);font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;transition:background var(--dur);background:var(--s2)}
.top-btn:active{background:var(--s3);transform:scale(.92)}

/* MAIN */
#app{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
.vw{padding:16px 16px calc(var(--nav) + 16px);min-height:100%;animation:fi .22s var(--ease)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* BOTTOM NAV */
.nv{height:var(--nav);display:flex;background:var(--s1);border-top:1px solid var(--brd);
  position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:.62rem;color:var(--tx3);transition:color var(--dur);-webkit-user-select:none;user-select:none}
.ni .ic{font-size:1.35rem;transition:transform var(--dur)}
.ni.on{color:var(--fr1)}
.ni.on .ic{transform:scale(1.12)}
.ni:active .ic{transform:scale(.85)}

/* CARDS */
.cd{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:16px;
  box-shadow:var(--sh);transition:transform var(--dur),box-shadow var(--dur)}
.cd:active{transform:scale(.98)}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px}
.dc{text-align:center;padding:20px 12px;cursor:pointer;position:relative;overflow:hidden}
.dc .em{font-size:2.1rem;margin-bottom:6px;display:block}
.dc .nm{font-family:var(--fd);font-size:clamp(.88rem,2.4vw,1.05rem);font-weight:700;margin-bottom:4px}
.dc .mt{font-size:.72rem;color:var(--tx2)}
.dc .db{position:absolute;top:8px;right:8px;background:var(--eng);color:#fff;border-radius:12px;
  padding:2px 8px;font-size:.68rem;font-weight:700;min-width:20px;text-align:center}
.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}

/* FLIP CARD */
.fc{perspective:1200px;width:100%;max-width:400px;margin:0 auto;aspect-ratio:3/4;max-height:52vh;cursor:pointer;-webkit-user-select:none;user-select:none}
.fi2{position:relative;width:100%;height:100%;transition:transform .55s var(--ease);transform-style:preserve-3d}
.fi2.fl{transform:rotateY(180deg)}
.ff,.fb2{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;font-size:clamp(.95rem,2.8vw,1.15rem);line-height:1.6;
  background:var(--s1);border:1px solid var(--brd);box-shadow:var(--sh);overflow-y:auto}
.fb2{transform:rotateY(180deg);font-size:clamp(.85rem,2.4vw,1rem)}
.ff .lb,.fb2 .lb{position:absolute;top:10px;left:14px;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);font-weight:700}

/* MCQ */
.mq{display:flex;flex-direction:column;gap:10px;margin-top:14px;width:100%;max-width:400px;margin-left:auto;margin-right:auto}
.mb{padding:13px 16px;border-radius:var(--r);background:var(--s2);border:2px solid var(--brd);
  text-align:left;font-size:clamp(.82rem,2.2vw,.95rem);transition:all .2s var(--ease);line-height:1.4}
.mb:active{transform:scale(.97)}
.mb.ok{border-color:var(--geo);background:rgba(152,195,121,.15);color:var(--geo)}
.mb.ko{border-color:var(--eng);background:rgba(224,108,117,.15);color:var(--eng)}
.mb.rv{border-color:var(--geo);opacity:.6}

/* TYPE */
.ta{width:100%;max-width:400px;margin:14px auto 0}
.ti{width:100%;padding:13px 14px;border-radius:var(--r);background:var(--s2);border:2px solid var(--brd);
  color:var(--tx1);font-size:.95rem;resize:none;min-height:72px;transition:border-color var(--dur)}
.ti:focus{outline:none;border-color:var(--fr1)}
.tr{margin-top:10px;padding:13px;border-radius:var(--r);font-size:.88rem;line-height:1.5}
.tr.tg{background:rgba(152,195,121,.12);border:1px solid var(--geo)}
.tr.tb{background:rgba(224,108,117,.12);border:1px solid var(--eng)}

/* BUTTONS */
.bt{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 22px;border-radius:var(--r);font-weight:600;font-size:.88rem;
  transition:all .2s var(--ease);-webkit-user-select:none;user-select:none}
.bt:active{transform:scale(.95)}
.bp{background:var(--fr1);color:#fff}
.bp:active{background:#4a9de0}
.bo{border:2px solid var(--brd);color:var(--tx1)}
.bo:active{background:var(--s2)}
.bd{background:var(--eng);color:#fff}
.bs{padding:7px 14px;font-size:.78rem;border-radius:8px}
.bw{width:100%;justify-content:center}
.bg2{display:flex;gap:8px;flex-wrap:wrap}
.fab{position:fixed;bottom:calc(var(--nav) + 18px);right:18px;width:52px;height:52px;
  border-radius:50%;background:var(--fr1);color:#fff;font-size:1.6rem;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(97,175,239,.4);z-index:50}
.fab:active{transform:scale(.9)}

/* PROGRESS */
.pb{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:10px 0}
.pf{height:100%;border-radius:3px;transition:width .4s var(--ease)}
.sp{font-size:.72rem;color:var(--tx2);text-align:center;margin-bottom:6px}

/* STATS */
.sc{text-align:center;padding:14px}
.sv{font-family:var(--fd);font-size:clamp(1.6rem,5vw,2.3rem);font-weight:700;line-height:1}
.sl{font-size:.72rem;color:var(--tx2);margin-top:3px}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.bc{display:flex;align-items:flex-end;gap:5px;height:110px;padding:6px 0}
.bcl{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s var(--ease)}
.bla{font-size:.58rem;color:var(--tx3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bva{font-size:.62rem;color:var(--tx2);font-weight:600}
.stc{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.std{aspect-ratio:1;border-radius:3px;font-size:.58rem;display:flex;align-items:center;justify-content:center;color:var(--tx3)}
.std.on{color:#fff;font-weight:700}

/* FORMS */
.fg{margin-bottom:14px}
.fl2{display:block;font-size:.78rem;color:var(--tx2);margin-bottom:5px;font-weight:600}
.fin{width:100%;padding:11px 12px;border-radius:8px;background:var(--s2);border:1px solid var(--brd);color:var(--tx1);transition:border-color var(--dur)}
.fin:focus{outline:none;border-color:var(--fr1)}
textarea.fin{min-height:90px;resize:vertical}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fao .18s var(--ease)}
@keyframes fao{from{opacity:0}to{opacity:1}}
.md{background:var(--s1);border-radius:16px 16px 0 0;padding:22px;width:100%;max-width:480px;
  max-height:82vh;overflow-y:auto;animation:su .28s var(--ease)}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.md h2{font-family:var(--fd);font-size:1.15rem;margin-bottom:14px}
.ma{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

/* FICHE */
.fct{font-size:clamp(.86rem,2.2vw,.98rem);line-height:1.75;white-space:pre-wrap;word-wrap:break-word;max-width:640px;margin:0 auto}
.fti{font-family:var(--fd);font-size:clamp(1.05rem,2.8vw,1.4rem);font-weight:700;margin-bottom:14px;text-align:center}

/* TOGGLE */
.tg{position:relative;width:46px;height:26px;background:var(--s3);border-radius:13px;cursor:pointer;transition:background var(--dur);flex-shrink:0}
.tg.on{background:var(--fr1)}
.tg::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;
  transition:transform var(--dur) var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tg.on::after{transform:translateX(20px)}

/* SETTING ROW */
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--brd)}
.sinf{flex:1;margin-right:10px}
.sti{font-weight:600;font-size:.88rem}
.sde{font-size:.72rem;color:var(--tx2)}

/* LIST ITEM */
.li{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);
  border:1px solid var(--brd);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:background var(--dur)}
.li:active{background:var(--s2)}
.li .fr{flex:1;font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .bp2{font-size:.72rem;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SEARCH */
.sb{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--brd);
  border-radius:var(--r);padding:0 12px;margin-bottom:14px}
.sb input{flex:1;background:transparent;border:none;padding:11px 0;color:var(--tx1)}
.sb input:focus{outline:none}
.sb .ic{color:var(--tx3)}

/* TIMER */
.tm{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:10px;
  background:var(--s2);font-family:var(--fm);font-size:.78rem;color:var(--tx2)}
.tm.tw{color:var(--eng);background:rgba(224,108,117,.1)}

/* GRADE */
.gb{display:flex;gap:7px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.gr{padding:10px 0;flex:1;min-width:56px;border-radius:8px;font-size:.72rem;font-weight:700;text-align:center;transition:all .2s}
.gr:active{transform:scale(.9)}
.g0{background:rgba(224,108,117,.2);color:var(--eng)}
.g3{background:rgba(209,154,102,.2);color:var(--hist)}
.g4{background:rgba(152,195,121,.2);color:var(--geo)}
.g5{background:rgba(97,175,239,.2);color:var(--fr1)}

/* MODE TABS */
.mt2{display:flex;gap:5px;margin-bottom:14px;justify-content:center}
.mtb{padding:7px 14px;border-radius:18px;font-size:.78rem;font-weight:600;background:var(--s2);color:var(--tx2);transition:all var(--dur)}
.mtb.on{background:var(--fr1);color:#fff}

/* ANIMATIONS */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shk{animation:shake .4s ease-in-out}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.pop{animation:pop .3s var(--ease)}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}

.empty{text-align:center;padding:40px 20px;color:var(--tx2)}
.empty .ic{font-size:2.8rem;margin-bottom:10px;display:block}

.sec{font-family:var(--fd);font-size:clamp(.95rem,2.6vw,1.2rem);font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec .ln{flex:1;height:1px;background:var(--brd)}
.ch{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:10px;font-size:.68rem;font-weight:600}

.tab-r{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:3px}
.tab-i{padding:7px 14px;border-radius:18px;font-size:.78rem;font-weight:600;white-space:nowrap;background:var(--s2);color:var(--tx2);transition:all var(--dur);flex-shrink:0}
.tab-i.on{background:var(--fr1);color:#fff}

.fn{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

@media(min-width:600px){.vw{padding:22px 28px calc(var(--nav) + 22px)}.dg{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}.md{border-radius:16px;margin-bottom:4vh}}
@media(min-width:900px){.nv{left:auto;right:auto;width:480px;margin:0 auto;border-radius:16px 16px 0 0;border:1px solid var(--brd);border-bottom:none}}
</style>
</head>
<body>
<div class="top" id="top"><h1 id="tt">📚 DAEU Révisions</h1><button class="top-btn" id="ta" style="display:none"></button></div>
<div id="app"></div>
<nav class="nv" id="nav">
<button class="ni on" data-v="home"><span class="ic">🏠</span>Accueil</button>
<button class="ni" data-v="decks"><span class="ic">📂</span>Decks</button>
<button class="ni" data-v="stats"><span class="ic">📊</span>Stats</button>
<button class="ni" data-v="settings"><span class="ic">⚙️</span>Plus</button>
</nav>
<canvas id="confetti"></canvas>
<script>
/* ═══════ 1. DONNÉES PAR DÉFAUT (contenu DAEU réel) ═══════ */
const D=[
{id:'eng',name:'Anglais',icon:'🇬🇧',color:'#e06c75',
cards:[
{id:'e01',f:"À quoi sert le Present Simple ?",b:"Actions habituelles, vérités générales, routines.\n• I work every day. / She works hard.\n• Négatif : don't / doesn't + BV\n• Question : Do/Does + sujet + BV?\nMots-clés : always, often, usually, every day, never"},
{id:'e02',f:"À quoi sert le Present Continuous ?",b:"Actions en cours, situations temporaires.\n• I am studying right now.\n• Formation : sujet + am/is/are + V-ing\nMots-clés : now, at the moment, currently"},
{id:'e03',f:"Present Simple vs Continuous ?",b:"Simple → habitude / permanent\n\"I play tennis every week.\"\n\nContinuous → en cours / temporaire\n\"I am playing tennis right now.\""},
{id:'e04',f:"Past Simple : formation avec les verbes réguliers ?",b:"Base verbale + -ed\n• work → worked\n• study → studied (y→ied)\n• stop → stopped (consonne doublée)\nNégatif : didn't + BV\nQuestion : Did + sujet + BV?"},
{id:'e05',f:"Cite 10 verbes irréguliers courants au prétérit.",b:"be → was/were | go → went\nhave → had | do → did\nmake → made | come → came\ntake → took | see → saw\nget → got | know → knew\nbring → brought | leave → left"},
{id:'e06',f:"Present Perfect : formation et usage.",b:"Have/Has + past participle\n• I have lived in Orléans for many years.\n• She has studied since last year.\nUsage : action passée liée au présent, expérience, durée qui continue."},
{id:'e07',f:"FOR vs SINCE avec le Present Perfect.",b:"FOR + durée → for 5 years, for many months\nSINCE + date précise → since 2010, since last Monday\n\nAGO → Past Simple : \"2 years ago, I decided...\""},
{id:'e08',f:"Comment former le comparatif en anglais ?",b:"Court (1 syll.) : adj + -er than → taller than\nLong (2+ syll.) : more + adj + than → more beautiful\n\nIrréguliers :\ngood → better | bad → worse | far → farther"},
{id:'e09',f:"Comment former le superlatif ?",b:"Court : the + adj-est → the tallest\nLong : the most + adj → the most interesting\n\nIrréguliers :\ngood → the best | bad → the worst"},
{id:'e10',f:"Méthode 5W + 1H pour analyser un document.",b:"Who? → Qui ?\nWhat? → Quoi ?\nWhere? → Où ?\nWhen? → Quand ?\nWhy? → Pourquoi ?\nHow? → Comment ?\n\nStructure l'analyse de tout document audio ou écrit."},
{id:'e11',f:"Structure d'un texte argumentatif en anglais.",b:"Introduction : sujet + opinion\n\nBody :\n• Argument 1 + exemple\n• Argument 2 + exemple\n• (Contre-argument + réfutation)\n\nConclusion : résumé + réaffirmation\n\nConnecteurs : First, Moreover, However, In conclusion"},
{id:'e12',f:"Vocabulaire : la technologie au quotidien.",b:"time-saving inventions → inventions gain de temps\nsmart devices → appareils intelligents\nhealth diagnostics → diagnostics médicaux\nconvenient → pratique\nessential → essentiel"},
{id:'e13',f:"Quand utilise-t-on THE, A/AN ou Ø ?",b:"a/an → chose quelconque : a book\nthe → chose précise : the sun, the Louvre\nØ → généralités : Ø Dogs are loyal.\n\nTHE + pays : the UK, the USA\nØ + pays : France, Spain"},
{id:'e14',f:"Les connecteurs logiques en anglais.",b:"Addition : moreover, furthermore, also\nOpposition : however, nevertheless\nCause : because, since, due to\nConséquence : therefore, as a result\nConclusion : in conclusion, to sum up"},
{id:'e15',f:"Thanksgiving : quand et pourquoi ?",b:"4e jeudi de novembre.\nPilgrim Fathers → Mayflower (sept. 1620)\nHiver difficile, aide de Squanto\nRécolte abondante → repas de remerciement (nov. 1621)\nPlat : turkey (dinde)"},
{id:'e16',f:"Les 4 pays du UK et leurs capitales.",b:"England → London\nWales → Cardiff\nScotland → Edinburgh\nNorthern Ireland → Belfast"},
{id:'e17',f:"Past Continuous : structure et usage ?",b:"was/were + V-ing\nAction en cours dans le passé.\nSouvent avec Past Simple (interruption) :\n\"I was cooking when she came in.\""},
{id:'e18',f:"'ready-made meals' vs 'homemade' ?",b:"ready-made meals = plats préparés (industriels)\nhomemade = fait maison\nchef = cuisinier (personne)\ncooker = appareil de cuisson"}
],
fiches:[
{id:'ef01',title:'Present Simple, Continuous & Past',content:"■ PRESENT SIMPLE\nActions habituelles, vérités générales.\nFormation : S + V (+ s 3e pers.)\nMots-clés : always, often, usually, every day, never\nEx : \"She plays tennis every Saturday.\"\n\n■ PRESENT CONTINUOUS\nAction en cours, situation temporaire.\nFormation : S + am/is/are + V-ing\nMots-clés : now, right now, at the moment\nEx : \"I am reading a book right now.\"\n\n■ PAST SIMPLE\nAction terminée dans le passé.\nRégulier : V + -ed (worked, studied)\nIrrégulier : formes à apprendre (went, saw, took)\nMots-clés : yesterday, last week, ago, in 2010\n\n■ PRESENT PERFECT\nAction passée liée au présent.\nFormation : S + have/has + past participle\nFOR + durée | SINCE + date\nEx : \"I have lived here for many years.\""},
{id:'ef02',title:'Méthode : texte argumentatif',content:"■ STRUCTURE D'UN ESSAI ARGUMENTATIF\n\n1) INTRODUCTION\n— Contexte du sujet\n— Problématique\n— Opinion clairement annoncée\n\n2) DÉVELOPPEMENT (2-3 paragraphes)\n— Un argument par paragraphe + exemple concret\n— Connecteurs logiques entre les idées\n— Éventuellement un contre-argument + réfutation\n\n3) CONCLUSION\n— Résumé des arguments\n— Réaffirmation de l'opinion\n— Ouverture\n\n■ CONNECTEURS\nFirst of all / Moreover / However\nIn addition / On the other hand / Therefore\nIn conclusion / To sum up / All in all\n\n■ PHRASES D'OPINION\nIn my opinion / I believe that\nIt seems to me that / I would argue that"},
{id:'ef03',title:'Verbes irréguliers essentiels',content:"be → was/were → been\nbecome → became → become\nbring → brought → brought\nbuy → bought → bought\ncome → came → come\ndo → did → done\ndrive → drove → driven\neat → ate → eaten\nfeel → felt → felt\nfind → found → found\nget → got → got\ngive → gave → given\ngo → went → gone\nhave → had → had\nknow → knew → known\nleave → left → left\nmake → made → made\nput → put → put\nread → read → read\nrun → ran → run\nsay → said → said\nsee → saw → seen\nspeak → spoke → spoken\nspend → spent → spent\ntake → took → taken\ntell → told → told\nthink → thought → thought\nwrite → wrote → written"},
{id:'ef04',title:'Vocabulaire : UK, Tourisme & Food',content:"■ UK = 4 pays\nEngland (London), Wales (Cardiff), Scotland (Edinburgh), Northern Ireland (Belfast)\n\n■ TOURISME\nlandmarks, iconic places, sightseeing, harbour, sky-scrapers, suburbs, downtown\novertourism, eco-tourism, mass tourism, World Heritage Sites\n\n■ FOOD & COOKING\nready-made meals ≠ homemade\nchef = cook (person) ≠ cooker (machine)\nto dunk = tremper (biscuit dans le thé)\nedible = comestible\nFull English Breakfast: fried eggs, bacon, sausages, beans, toasts\n\n■ THANKSGIVING\n4th Thursday of November\nPilgrim Fathers → Mayflower (1620)\nSquanto aida les colons → récolte abondante → repas de remerciement (1621)"}
]},
{id:'fr1',name:'Français Littérature',icon:'📖',color:'#61afef',
cards:[
{id:'f01',f:"Qui est Eugène Ionesco ?",b:"Auteur franco-roumain (1909-1994)\nThéâtre de l'absurde\nŒuvre clé : Rhinocéros (1959)\nÉlu Académie française (1970)\nDénonce le conformisme et les totalitarismes."},
{id:'f02',f:"Qu'est-ce que le Théâtre de l'absurde ?",b:"Mouvement post-1945.\n• Remise en cause du langage\n• Absence d'intrigue classique\n• Personnages déshumanisés\n• Situations illogiques / grotesques\nAuteurs : Ionesco, Beckett, Adamov"},
{id:'f03',f:"Rhinocéros : résumé et thèmes.",b:"Résumé : les habitants se transforment en rhinocéros. Seul Bérenger résiste.\n\nThèmes :\n• Conformisme et pensée de masse\n• Allégorie du nazisme/fascisme\n• Résistance individuelle\n• Déshumanisation\n• Langage comme manipulation"},
{id:'f04',f:"Scène d'exposition : éléments essentiels.",b:"Première(s) scène(s) d'une pièce.\nFonctions :\n• Présenter les personnages\n• Situer lieu et époque\n• Lancer l'intrigue\n• Donner le ton\n• Capter l'attention\nDans Rhinocéros : petite ville, dimanche midi, été."},
{id:'f05',f:"Structure du commentaire composé.",b:"INTRODUCTION\n— Accroche + auteur/œuvre/contexte\n— Situer l'extrait\n— Problématique\n— Annonce du plan (2-3 axes)\n\nDÉVELOPPEMENT\n— Argument → citation → analyse → interprétation\n— Transitions entre parties\n\nCONCLUSION\n— Bilan + réponse à la problématique\n— Ouverture"},
{id:'f06',f:"Cite 5 figures de style avec exemples.",b:"1. Comparaison (avec outil) : « plat comme un trottoir »\n2. Métaphore (sans outil) : l'albatros = le poète\n3. Hyperbole (exagération) : « mourir de rire »\n4. Anaphore (répétition début) : « Moi, président... »\n5. Oxymore (termes contradictoires) : « obscure clarté »"},
{id:'f07',f:"Litote, euphémisme, antithèse ?",b:"Litote : dire moins pour suggérer plus\n→ « Ce n'est pas mal » = c'est très bien\n\nEuphémisme : atténuer une réalité dure\n→ « Il nous a quittés » = il est mort\n\nAntithèse : opposition de deux idées\n→ idéal d'Emma ≠ médiocrité de Charles"},
{id:'f08',f:"Accumulation, gradation, personnification ?",b:"Accumulation : énumération d'éléments\n→ « chapeau, manteau, gants, écharpe... »\n\nGradation : intensité croissante\n→ « Va, cours, vole ! » (Corneille)\n\nPersonnification : qualités humaines → non-humain\n→ « La mer se déchaîne »"},
{id:'f09',f:"Comment insérer une citation ?",b:"Règles :\n1. Entre guillemets : « citation »\n2. Intégrée dans la phrase\n3. Coupure : [...]\n4. TOUJOURS suivie d'une ANALYSE\n\nSchéma : Idée → Citation → Procédé → Effet → Interprétation\n\n❌ Jamais citer sans analyser"},
{id:'f10',f:"Baudelaire : L'Albatros — thèmes.",b:"Les Fleurs du Mal (1857), procès pour immoralité.\n\nL'Albatros : poème allégorique\n• Albatros majestueux en vol, maladroit au sol\n• = le poète incompris par la société\n• Dualité idéal / spleen\n• Alexandrin (12 syllabes), césure (6//6)"},
{id:'f11',f:"Flaubert : Madame Bovary — thèmes.",b:"1857, procès pour immoralité. Mouvement : Réalisme.\n\nThèmes :\n• Illusions romanesques d'Emma\n• Bovarysme (insatisfaction chronique)\n• Critique du mariage bourgeois\n• Éducation des femmes au XIXe\n• Médiocrité provinciale\n\nCharles = banal ≠ Emma = rêve d'amour idéal"},
{id:'f12',f:"Le syllogisme dans Rhinocéros.",b:"Raisonnement logique en 3 étapes :\nPrémisse 1 → Prémisse 2 → Conclusion\n\nDans Rhinocéros : le Logicien fait des syllogismes ABSURDES\n→ Critique de la manipulation intellectuelle\n→ La logique peut justifier l'injustifiable"},
{id:'f13',f:"Qu'est-ce que le réalisme littéraire ?",b:"Mouvement du XIXe (1850-1890).\n• Montrer la réalité sans l'embellir\n• Observation minutieuse de la société\n• Style impersonnel\n• Documentation précise\n\nAuteurs : Flaubert, Balzac, Stendhal, Maupassant\nSuccesseur : Naturalisme (Zola)"},
{id:'f14',f:"Maupassant : Une Vie — éléments clés.",b:"1883, premier roman.\nSous-titre : « L'humble vérité »\n\nJeanne : aristocrate normande, espoirs → désillusions.\n• Condition féminine au XIXe\n• Espoirs déçus et résignation\n• Ennui de la vie\n• Message : la vie n'est ni bonne ni mauvaise"},
{id:'f15',f:"Qu'est-ce qu'une didascalie ?",b:"Indication scénique au théâtre.\nDécrit le décor, gestes, ton, déplacements.\nÉcrite en italique, non prononcée.\n\nAutres termes :\n• Réplique : parole d'un personnage\n• Tirade : longue réplique\n• Monologue : seul en scène\n• Aparté : dit au public seulement\n• Double énonciation : au personnage + au public"}
],
fiches:[
{id:'ff01',title:'Rhinocéros — Analyse complète',content:"■ AUTEUR : Eugène Ionesco (1909-1994), théâtre de l'absurde.\n\n■ ŒUVRE : Rhinocéros (1959), 3 actes + 4 tableaux.\n\n■ RÉSUMÉ\nLes habitants se métamorphosent en rhinocéros. Bérenger, antihéros marginal, est le seul à résister.\n\n■ PERSONNAGES CLÉS\n• Bérenger : antihéros, résistant, marginal\n• Jean : conformiste, se transforme\n• Daisy : finit par céder\n• Le Logicien : parodie de la raison\n\n■ THÈMES\n1. Conformisme et pensée de masse\n2. Totalitarismes (nazisme, fascisme)\n3. Résistance individuelle\n4. Déshumanisation\n5. Langage détourné\n\n■ SCÈNE D'EXPOSITION\nLieu : petite ville, dimanche midi, été\nArbre poussiéreux = indice rhinocérite\nJean (soigné) ≠ Bérenger (négligé)\n\n■ LE SYLLOGISME (Acte I)\nLogicien = démonstrations absurdes → manipulation intellectuelle\n\n■ MÉTAMORPHOSE DE JEAN (Acte II)\nTransformation théâtralisée : bruits, corne, langage → cris animaux\nHumanisme (Bérenger) vs barbarie (Jean-rhinocéros)"},
{id:'ff02',title:'Méthodologie du commentaire composé',content:"■ OBJECTIF\nAnalyser COMMENT le texte produit du sens (procédés + effets).\n\n■ INTRODUCTION (15-20 lignes)\n1. Accroche contextuelle\n2. Auteur, œuvre, date, genre, mouvement\n3. Situation de l'extrait\n4. Problématique (question)\n5. Annonce du plan (2-3 axes)\n\n■ DÉVELOPPEMENT (2-3 parties)\nChaque partie :\n— Idée directrice\n— Sous-parties (2-3)\n— Argument → citation « » → analyse procédé → interprétation\n— Transition\n\n■ CONCLUSION\n— Bilan (réponse à la problématique)\n— Ouverture\n\n■ ERREURS À ÉVITER\n✗ Paraphraser au lieu d'analyser\n✗ Citer sans analyser\n✗ Oublier la problématique\n✗ Plan narratif (début/milieu/fin)\n✗ Dire « je » ou « ce texte est intéressant »\n\n■ FORMULE\nProcédé → Citation → Effet → Interprétation"},
{id:'ff03',title:'Les figures de style essentielles',content:"■ ANALOGIE\n• Comparaison : avec outil (comme, tel) → « plat comme un trottoir »\n• Métaphore : sans outil → « cet homme est un lion »\n• Personnification : qualités humaines → « la mer en colère »\n• Allégorie : idée abstraite → image concrète\n\n■ AMPLIFICATION / ATTÉNUATION\n• Hyperbole : exagération → « je meurs de faim »\n• Litote : dire moins → « ce n'est pas mal » = très bien\n• Euphémisme : atténuer → « il nous a quittés »\n\n■ OPPOSITION\n• Antithèse : deux idées opposées\n• Oxymore : termes contradictoires → « obscure clarté »\n\n■ CONSTRUCTION\n• Anaphore : répétition en début → « Moi, président... »\n• Gradation : intensité croissante → « Va, cours, vole ! »\n• Accumulation : énumération\n• Chiasme : structure croisée AB/BA\n• Tautologie : répétition du même sens"}
]},
{id:'fr2',name:'Français Argumentation',icon:'✍️',color:'#c678dd',
cards:[
{id:'a01',f:"Qu'est-ce qu'un texte argumentatif ?",b:"Texte où l'auteur défend une opinion (thèse) avec arguments et exemples.\n\n• Thèse = opinion\n• Arguments = raisons\n• Exemples = preuves concrètes\n• Connecteurs logiques = liens"},
{id:'a02',f:"Convaincre vs Persuader ?",b:"CONVAINCRE → la RAISON\n• Arguments logiques, faits, stats\n• « Les études montrent que... »\n\nPERSUADER → les SENTIMENTS\n• Émotions, images fortes\n• « Imaginez la souffrance de... »"},
{id:'a03',f:"Qu'est-ce que l'énonciation ?",b:"Situation de communication du texte.\n• QUI parle ? (auteur, narrateur)\n• À QUI ? (destinataire)\n• QUAND ? (époque)\n• OÙ ? (contexte)\n• DANS QUEL BUT ?\n\nMarques : pronoms (je, nous, on), temps verbaux"},
{id:'a04',f:"Que sont les marques de subjectivité ?",b:"Indices de l'opinion de l'auteur :\n• Pronoms : je, nous, on\n• Verbes d'opinion : penser, croire\n• Adjectifs évaluatifs : magnifique, horrible\n• Adverbes : évidemment, malheureusement\n• Vocabulaire mélioratif / péjoratif\n• Exclamations, impératif"},
{id:'a05',f:"Connecteurs : cause et conséquence.",b:"CAUSE : car, parce que, puisque, en effet, grâce à\n\nCONSÉQUENCE : donc, par conséquent, c'est pourquoi, ainsi, de sorte que"},
{id:'a06',f:"Connecteurs : opposition et concession.",b:"OPPOSITION : mais, cependant, toutefois, néanmoins, en revanche, pourtant\n\nCONCESSION : certes... mais, bien que, même si, il est vrai que... cependant"},
{id:'a07',f:"Plan thématique vs dialectique.",b:"THÉMATIQUE\n→ Question partielle (comment/pourquoi)\n→ 2-3 aspects du sujet\n\nDIALECTIQUE\n→ Question totale (oui/non)\n→ I. Thèse / II. Antithèse / III. Synthèse\n\nEx dialectique : « Le numérique aide-t-il l'éducation ? »"},
{id:'a08',f:"Introduction de l'essai : les 3 étapes.",b:"1. AMORCE\n→ Phrase générale, fait de société, citation\n\n2. PROBLÉMATIQUE\n→ Reformuler le sujet en question\n\n3. ANNONCE DU PLAN\n→ « Nous verrons d'abord... puis... »\n\nToujours au « nous » (pas « je »)"},
{id:'a09',f:"Développement de l'essai.",b:"2-3 parties, chacune :\n\n1. Idée directrice\n2. Argument(s)\n3. Exemple(s) concret(s)\n4. Transition vers partie suivante\n\nChaque paragraphe = 1 argument + 1 exemple\nAlinéa + saut de ligne entre parties"},
{id:'a10',f:"Conclusion de l'essai.",b:"2 étapes :\n\n1. BILAN\n→ Résumer les arguments\n→ Répondre à la problématique\n\n2. OUVERTURE\n→ Question plus vaste\n→ Perspective future\n\n❌ Pas de nouveaux arguments en conclusion"},
{id:'a11',f:"Les valeurs du présent de l'indicatif.",b:"1. Vérité générale : « La Terre tourne »\n2. Habitude : « Je prends le bus chaque matin »\n3. Énonciation : moment où l'on parle\n4. Narration : « En 1789, le peuple prend la Bastille »\n5. Futur proche : « Je pars demain »"},
{id:'a12',f:"Structure d'un paragraphe argumentatif.",b:"1. Affirmation (opinion)\n2. Explication (développer)\n3. Exemple concret\n4. Mini-conclusion\n\nConnecteur + Argument + Exemple + Analyse"},
{id:'a13',f:"Les valeurs du conditionnel.",b:"Présent :\n• Politesse : « Je voudrais un café »\n• Souhait : « J'aimerais voyager »\n• Hypothèse : « Si j'étais riche, je voyagerais »\n• Info non confirmée : « Il y aurait 10 victimes »\n\nPassé :\n• Regret : « J'aurais voulu être artiste »"},
{id:'a14',f:"Les valeurs du pronom « on ».",b:"1. ON = NOUS (familier) : « On va au ciné »\n2. ON = LES GENS : « On dit que... »\n3. ON = QUELQU'UN (indéfini) : « On m'a volé »\n4. ON = JE/TU (stylistique) : « On n'est pas content ? »"}
],
fiches:[
{id:'af01',title:"Méthode complète de l'essai",content:"■ STRUCTURE\n\n1) INTRODUCTION (10-15 lignes)\n— Amorce : phrase générale\n— Reformulation du sujet\n— Annonce du plan (2 ou 3 parties)\n\n2) DÉVELOPPEMENT\nPartie I → Argument 1 + ex. → Argument 2 + ex. → Transition\nPartie II → Argument 1 + ex. → Argument 2 + ex. → Transition\n(Partie III si dialectique : synthèse)\n\n3) CONCLUSION\n— Bilan synthétique\n— Ouverture\n\n■ CONSEILS\n✓ Toujours au « nous »\n✓ Un argument par paragraphe\n✓ Exemples précis et analysés\n✓ Varier les connecteurs\n✓ Relire : orthographe + cohérence\n\n■ PLAN THÉMATIQUE : aspects du sujet\n■ PLAN DIALECTIQUE : thèse / antithèse / synthèse"},
{id:'af02',title:'Connecteurs logiques — Tableau',content:"■ INTRODUIRE\nd'abord, tout d'abord, premièrement, en premier lieu\n\n■ AJOUTER\nde plus, en outre, par ailleurs, également, de surcroît\n\n■ ILLUSTRER\npar exemple, notamment, ainsi, comme, en particulier\n\n■ OPPOSER\nmais, or, cependant, toutefois, néanmoins, en revanche, pourtant\n\n■ CONCÉDER\ncertes... mais, bien que, même si, il est vrai que... cependant\n\n■ CAUSE\ncar, parce que, puisque, en effet, grâce à, en raison de\n\n■ CONSÉQUENCE\ndonc, par conséquent, c'est pourquoi, ainsi, de sorte que\n\n■ CONCLURE\nen conclusion, en somme, en définitive, finalement, tout compte fait"},
{id:'af03',title:'Valeurs des temps verbaux',content:"■ PRÉSENT\n• Vérité générale : La Terre tourne autour du Soleil\n• Habitude : Je bois un café chaque matin\n• Narration : Hugo naît en 1802\n• Énonciation : Je te parle maintenant\n• Futur proche : Je pars demain\n\n■ IMPARFAIT\n• Description, habitude passée, action de second plan\n\n■ PASSÉ SIMPLE\n• Action de premier plan dans un récit (fait avancer l'action)\n\n■ PASSÉ COMPOSÉ\n• Action achevée avec lien au présent\n\n■ FUTUR\n• Action future certaine, projection\n\n■ CONDITIONNEL\n• Hypothèse, politesse, souhait, info non confirmée\n• Passé : regret, reproche, irréel du passé\n\n■ ASPECT\n• Inaccompli (temps simples) : elle chante\n• Accompli (temps composés) : elle a chanté"}
]},
{id:'geo',name:'Géographie',icon:'🌍',color:'#98c379',
cards:[
{id:'g01',f:"Définition de la mondialisation.",b:"Processus ancien de mise en relation des territoires par des flux de nature et d'intensité diverses.\n\nPhases :\n• 1492 : 1ère mondialisation\n• 1980 : bouclage du monde\n• 1990s : accélération (Internet, chute URSS)"},
{id:'g02',f:"Les 3 types de flux dans la mondialisation.",b:"1. MATÉRIELS : marchandises, matières premières (90% par mer)\n2. IMMATÉRIELS : capitaux, informations, données numériques\n3. HUMAINS : migrants, réfugiés, touristes (~280M migrants)"},
{id:'g03',f:"Les principaux acteurs de la mondialisation.",b:"1. FTN : moteur (Apple, Total, Toyota)\n2. ÉTATS : régulateurs\n3. OIG : OMC, FMI, Banque mondiale\n4. ONG : MSF, Greenpeace, Amnesty\n5. Individus / diasporas"},
{id:'g04',f:"Qu'est-ce qu'une FTN ?",b:"Firme transnationale (multinationale).\n\nRôle :\n• Organise la DIT\n• Investit à l'étranger (IDE)\n• Délocalise vers pays à bas coûts\n• R&D dans pays développés\n• Siège dans les métropoles"},
{id:'g05',f:"Qu'est-ce que la Triade ?",b:"3 pôles dominants de l'économie :\n1. Amérique du Nord (USA, Canada)\n2. Europe occidentale (UE)\n3. Asie-Pacifique (Japon, Corée du Sud)\n\nConcentrent ~60% du PIB mondial."},
{id:'g06',f:"Territoires intégrés vs marginalisés.",b:"INTÉGRÉS :\n• Métropoles (NY, Londres, Tokyo)\n• Façades maritimes (Northern Range)\n• Triade + émergents (BRICS)\n\nMARGINALISÉS :\n• PMA (Afrique subsaharienne)\n• Zones enclavées, zones de conflit\n\nÉMERGENTS : Chine, Inde, Brésil"},
{id:'g07',f:"ZEE, eaux territoriales, haute mer.",b:"EAUX TERRITORIALES (0-12 milles)\n→ Souveraineté totale\n\nZEE (12-200 milles)\n→ Droits exclusifs d'exploitation\n→ Pêche, hydrocarbures\n\nHAUTE MER (au-delà)\n→ International, libre navigation\n1 mille = 1,852 km"},
{id:'g08',f:"Routes maritimes mondiales.",b:"90% du commerce mondial par mer.\n\nRoutes : transatlantique, Europe-Asie (Suez), transpacifique\n\nPoints stratégiques :\n• Canal de Suez et Panama\n• Détroits de Malacca, Ormuz, Gibraltar\n\nGrands ports : Shanghai, Singapour, Rotterdam"},
{id:'g09',f:"USA vs Brésil : comparaison.",b:"PIB : USA 23 320 Mds$ vs Brésil 1 600 Mds$\nPIB/hab : 70 248$ vs 7 507$\nIDE : 9 863 Mds$ vs 705 Mds$\n\nUSA = 1ère puissance mondiale\nBrésil = puissance émergente (BRICS)"},
{id:'g10',f:"L'Amérique : tensions et intégration.",b:"43M km², 1 milliard d'hab.\n\nTENSIONS :\n• Inégalités Nord/Sud\n• Discriminations (BLM, Amérindiens)\n• Frontière USA/Mexique\n\nINTÉGRATION :\n• ACEUM (ex-ALENA)\n• MERCOSUR\n• Alliance du Pacifique"},
{id:'g11',f:"Hard Power et Soft Power des USA.",b:"HARD POWER :\n• Économique : GAFAM, dollar\n• Techno : NASA, SpaceX, 27% R&D mondiale\n• Militaire : 11 porte-avions, OTAN\n• Politique : G7, G20, ONU\n\nSOFT POWER :\n• Hollywood, musique, séries\n• Fast food, réseaux sociaux"},
{id:'g12',f:"Métropoles mondiales : rôle.",b:"Métropole = ville qui commande.\n\nFonctions :\n• Économiques : sièges FTN, bourses\n• Politiques : organisations internationales\n• Culturelles : musées, universités\n\nExemples : New York, Londres, Tokyo, Paris, Shanghai\nArchipel mégalopolitain mondial"},
{id:'g13',f:"Organisations régionales américaines.",b:"ACEUM (ex-ALENA, 2020) : Canada-USA-Mexique\n→ 500M hab, 1/4 richesse mondiale\n\nMERCOSUR (1991) : Brésil, Argentine, Paraguay, Uruguay\n→ 300M hab, 82% PIB Am. Sud\n\nAlliance du Pacifique (2012) : Mexique, Colombie, Pérou, Chili (« PUMAS »)"},
{id:'g14',f:"L'Afrique dans la mondialisation.",b:"30M km², ~50 États, 1,4 Md hab.\n\nDÉFIS : pauvreté, instabilité, infrastructures faibles\nPOTENTIEL : jeunesse, ressources naturelles, marchés en expansion, mobile banking"}
],
fiches:[
{id:'gf01',title:'La mondialisation — Synthèse',content:"■ DÉFINITION\nMise en relation des territoires par des flux divers. Accéléré depuis les années 1990.\n\n■ CHRONOLOGIE\n— XVIe s. : grandes découvertes\n— XIXe s. : révolution industrielle\n— 1945 : Bretton Woods, FMI, GATT\n— 1980 : bouclage du monde\n— 1991 : chute URSS → économie de marché\n— 2000s : Internet, essor de la Chine\n\n■ FLUX\n1) Matériels : marchandises (90% par mer)\n2) Immatériels : capitaux, données, brevets\n3) Humains : migrants (280M), réfugiés, touristes (1,4 Md)\n\n■ ACTEURS\n— FTN : moteur\n— États : régulateurs\n— OIG : OMC, FMI, ONU\n— ONG : contre-pouvoir\n\n■ TERRITOIRES\n— Intégrés : Triade, métropoles, façades maritimes\n— Émergents : BRICS\n— Marginalisés : PMA, zones enclavées\n\n■ FACTEURS D'ACCÉLÉRATION\n— Conteneurs, avion\n— Internet, câbles sous-marins\n— Libéralisation (OMC)"},

/* ═══════ 2. SM-2 ═══════ */
function sm2(s,q){let{ef,ivl,reps}=s;if(q>=3){if(!reps)ivl=1;else if(reps===1)ivl=3;else ivl=Math.round(ivl*ef);reps++}else{reps=0;ivl=1}
ef=Math.max(1.3,ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));return{ef:Math.round(ef*100)/100,ivl,reps,due:Date.now()+ivl*864e5}}
function dcs(){return{ef:2.5,ivl:0,reps:0,due:0,hist:[]}}

/* ═══════ 3. STATE & PERSISTENCE ═══════ */
const SK='daeu';
function ld(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch(e){}return null}
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
function init(){let d=ld();if(!d||!d.decks||!d.decks.length){d={decks:D.map(dk=>({...dk,cards:dk.cards.map(c=>({id:c.id,f:c.f,b:c.b}))})),cs:{},stats:{streak:0,last:null,daily:{}},settings:{dm:'auto',timer:false,ts:30}};D.forEach(dk=>dk.cards.forEach(c=>{d.cs[c.id]=dcs()}))}
d.decks.forEach((dk,i)=>{if(!dk.fiches&&D[i])dk.fiches=D[i].fiches||[];if(!dk.fiches)dk.fiches=[]});return d}

const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const app=$('#app'),tt=$('#tt'),ta=$('#ta');
let Z=init(),V='home',SU=null,ST=null,TI=null,ML=null;

function theme(){const s=Z.settings.dm;if(s==='auto'){document.documentElement.dataset.theme=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}else document.documentElement.dataset.theme=s}
theme();matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(Z.settings.dm==='auto')theme()});

function td(){return new Date().toISOString().slice(0,10)}
function us(){const t=td();if(Z.stats.last===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);Z.stats.streak=Z.stats.last===y?Z.stats.streak+1:1;Z.stats.last=t;sv(Z)}
function rs(ok){const t=td();if(!Z.stats.daily[t])Z.stats.daily[t]={r:0,c:0};Z.stats.daily[t].r++;if(ok)Z.stats.daily[t].c++;us();sv(Z)}
function due(id){const dk=Z.decks.find(d=>d.id===id);if(!dk)return[];const n=Date.now();return dk.cards.filter(c=>{const s=Z.cs[c.id];return!s||s.due<=n})}
function allDue(){const n=Date.now();let c=0;Z.decks.forEach(d=>d.cards.forEach(cd=>{const s=Z.cs[cd.id];if(!s||s.due<=n)c++}));return c}
function lev(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>{const r=new Array(n+1);r[0]=i;return r});for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));return dp[m][n]}
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim().replace(/\s+/g,' ')}
function sim(a,b){const na=norm(a),nb=norm(b);if(na===nb)return 1;if(!na||!nb)return 0;return 1-lev(na,nb)/Math.max(na.length,nb.length)}
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(s){return esc(s).replace(/\n/g,'<br>')}

/* ═══════ 4. NAVIGATION ═══════ */
function go(v,s=null){V=v;SU=s;ST=null;if(TI){clearInterval(TI);TI=null}render()}
$('#nav').addEventListener('click',e=>{const i=e.target.closest('.ni');if(!i)return;$$('.ni').forEach(n=>n.classList.remove('on'));i.classList.add('on');go(i.dataset.v)});

function rHome(){tt.textContent='📚 DAEU Révisions';ta.style.display='none';$('#nav').style.display='flex';
const d=allDue(),t=td(),ts=Z.stats.daily[t]||{r:0,c:0},p=ts.r?Math.round(ts.c/ts.r*100):0;
app.innerHTML=`<div class="vw">
<div style="text-align:center;margin-bottom:20px">

<div style="color:var(--tx2);font-size:.88rem">${d>0?d+' carte'+(d>1?'s':'')+' à réviser':'Toutes les cartes sont à jour ! 🎉'}</div>
</div>
<div class="sr">
<div class="cd sc"><div class="sv" style="color:var(--fr1)">${ts.r}</div><div class="sl">Révisées</div></div>
<div class="cd sc"><div class="sv" style="color:var(--geo)">${p}%</div><div class="sl">Réussite</div></div>
<div class="cd sc"><div class="sv" style="color:var(--hist)">${Z.stats.streak}</div><div class="sl">🔥 Streak</div></div>
</div>
${d>0?`<button class="bt bp bw" onclick="qStudy()" style="padding:15px;font-size:.95rem;margin-bottom:18px">▶ Réviser maintenant (${d})</button>`:''}
<div class="sec">Mes Decks <span class="ln"></span></div>
<div class="dg">${Z.decks.map(dk=>{const dc=due(dk.id).length;return`<div class="cd dc" onclick="go('deck-detail','${dk.id}')"><style>.dc[onclick*="${dk.id}"]::before{background:${dk.color}}</style>${dc>0?`<span class="db">${dc}</span>`:''}<span class="em">${dk.icon}</span><div class="nm">${esc(dk.name)}</div><div class="mt">${dk.cards.length} cartes${dk.fiches?.length?' · '+dk.fiches.length+' fiches':''}</div></div>`}).join('')}</div></div>`}

function qStudy(){const n=Date.now();let c=[];Z.decks.forEach(d=>d.cards.forEach(cd=>{const s=Z.cs[cd.id];if(!s||s.due<=n)c.push({...cd,did:d.id,col:d.color})}));if(!c.length)return;c=shuf(c).slice(0,20);ST={cards:c,i:0,mode:'flip',res:[],ans:false,flip:false,did:'all'};V='study';render()}

function rDD(){const dk=Z.decks.find(d=>d.id===SU);if(!dk)return go('home');tt.textContent=dk.icon+' '+dk.name;ta.style.display='flex';ta.textContent='✏️';ta.onclick=()=>go('editor',dk.id);$('#nav').style.display='flex';
const d=due(dk.id);
app.innerHTML=`<div class="vw">
<div class="sr">
<div class="cd sc"><div class="sv" style="color:${dk.color}">${dk.cards.length}</div><div class="sl">Cartes</div></div>
<div class="cd sc"><div class="sv" style="color:var(--eng)">${d.length}</div><div class="sl">À réviser</div></div>
<div class="cd sc"><div class="sv" style="color:var(--geo)">${dk.cards.length-d.length}</div><div class="sl">Maîtrisées</div></div>
</div>
${d.length?`<div class="sec">Mode d'étude <span class="ln"></span></div>
<div class="bg2" style="margin-bottom:18px">
<button class="bt bp" onclick="startS('${dk.id}','flip')" style="flex:1;background:${dk.color}">🔄 Flashcards</button>
<button class="bt bo" onclick="startS('${dk.id}','mcq')" style="flex:1">📝 QCM</button>
<button class="bt bo" onclick="startS('${dk.id}','type')" style="flex:1">⌨️ Saisie</button>
</div>`:`<div class="cd" style="text-align:center;padding:22px;margin-bottom:18px"><span style="font-size:2rem">🎉</span><p style="margin-top:6px;color:var(--tx2)">Tout est maîtrisé !</p></div>`}
${dk.fiches?.length?`<div class="sec">📄 Fiches de révision <span class="ln"></span></div>${dk.fiches.map((f,i)=>`<div class="li" onclick="go('fiche','${dk.id}:${i}')"><span style="font-size:1.1rem">📄</span><span class="fr">${esc(f.title)}</span><span style="color:var(--tx3)">›</span></div>`).join('')}`:''}
<div class="sec" style="margin-top:22px">📋 Toutes les cartes <span class="ln"></span></div>
${dk.cards.slice(0,10).map(c=>{const s=Z.cs[c.id]||dcs();return`<div class="li" onclick="previewCard('${dk.id}','${c.id}')"><span style="width:7px;height:7px;border-radius:50%;background:${s.due<=Date.now()?'var(--eng)':'var(--geo)'};flex-shrink:0"></span><span class="fr">${esc(c.f).substring(0,45)}${c.f.length>45?'…':''}</span></div>`}).join('')}

function rFiche(){const[did,fi]=SU.split(':');const dk=Z.decks.find(d=>d.id===did);if(!dk?.fiches)return go('home');const i=+fi,f=dk.fiches[i];if(!f)return go('deck-detail',did);
tt.textContent=dk.icon+' Fiche';ta.style.display='flex';ta.textContent='←';ta.onclick=()=>go('deck-detail',did);$('#nav').style.display='flex';
app.innerHTML=`<div class="vw"><div class="fti" style="color:${dk.color}">${esc(f.title)}</div><div class="fct">${fmt(f.content)}</div>

/* ═══════ 6. STUDY ═══════ */
function startS(did,mode){const dk=Z.decks.find(d=>d.id===did);if(!dk)return;let c=due(did).map(cd=>({...cd,did,col:dk.color}));if(!c.length)c=shuf(dk.cards).slice(0,10).map(cd=>({...cd,did,col:dk.color}));else c=shuf(c).slice(0,20);
ST={cards:c,i:0,mode,res:[],ans:false,flip:false,did,mcqOpts:null,mcqSel:-1,typeVal:'',typeSim:-1};V='study';render()}

function rStudy(){if(!ST||ST.i>=ST.cards.length)return rDone();const c=ST.cards[ST.i],dk=Z.decks.find(d=>d.id===(c.did||ST.did)),col=c.col||dk?.color||'var(--fr1)',pg=((ST.i)/ST.cards.length*100).toFixed(0);
tt.textContent=(dk?.icon||'📚')+' Révision';ta.style.display='flex';ta.textContent='✕';ta.onclick=()=>go(ST.did==='all'?'home':'deck-detail',ST.did==='all'?null:ST.did);$('#nav').style.display='none';
let tmr='';if(Z.settings.timer&&!ST.ans){if(!ST.ts){ST.ts=Date.now();ST.tr=Z.settings.ts;if(TI)clearInterval(TI);TI=setInterval(()=>{const e=Math.floor((Date.now()-ST.ts)/1e3);ST.tr=Math.max(0,Z.settings.ts-e);const el=document.getElementById('tmr');if(el){el.textContent=ST.tr+'s';el.className='tm'+(ST.tr<=5?' tw':'')}if(ST.tr<=0){clearInterval(TI);TI=null;if(ST.mode==='flip'&&!ST.flip){ST.flip=true;render()}}},1e3)}tmr=`<div style="text-align:center;margin-bottom:6px"><span id="tmr" class="tm${ST.tr<=5?' tw':''}">${ST.tr}s</span></div>`}
let ct='';if(ST.mode==='flip')ct=rFlip(c,col);else if(ST.mode==='mcq')ct=rMCQ(c,col);else ct=rType(c,col);
app.innerHTML=`<div class="vw" style="padding-bottom:20px">
<div class="mt2"><button class="mtb ${ST.mode==='flip'?'on':''}" onclick="swM('flip')">🔄 Flip</button><button class="mtb ${ST.mode==='mcq'?'on':''}" onclick="swM('mcq')">📝 QCM</button><button class="mtb ${ST.mode==='type'?'on':''}" onclick="swM('type')">⌨️ Saisie</button></div>
<div class="sp">${ST.i+1} / ${ST.cards.length}</div><div class="pb"><div class="pf" style="width:${pg}%;background:${col}"></div></div>${tmr}${ct}</div>`;
if(ST.mode==='type'&&!ST.ans){const inp=document.getElementById('tinp');if(inp)setTimeout(()=>inp.focus(),80)}}

/* ═══════ 12. IMPORT / EXPORT ═══════ */
function expD(){const b=new Blob([JSON.stringify(Z,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`daeu-${td()}.json`;a.click();URL.revokeObjectURL(u)}
function impD(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.decks){d.decks.forEach(nd=>{const ex=Z.decks.find(x=>x.id===nd.id);if(ex){nd.cards.forEach(nc=>{if(!ex.cards.find(c=>c.id===nc.id)){ex.cards.push(nc);if(!Z.cs[nc.id])Z.cs[nc.id]=dcs()}});if(nd.fiches){if(!ex.fiches)ex.fiches=[];nd.fiches.forEach(nf=>{if(!ex.fiches.find(f2=>f2.id===nf.id))ex.fiches.push(nf)})}}else{Z.decks.push(nd);nd.cards.forEach(nc=>{if(!Z.cs[nc.id])Z.cs[nc.id]=dcs()})}});if(d.cs)Object.assign(Z.cs,d.cs);sv(Z);render();alert('✅ Import réussi !')}else alert('❌ Format invalide.')}catch(err){alert('❌ Erreur : '+err.message)}};r.readAsText(f);ev.target.value=''}

/* ═══════ 13. CONFETTI ═══════ */
function confetti(){const cv=document.getElementById('confetti'),cx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;
const ps=[],cs=['#e06c75','#61afef','#c678dd','#98c379','#d19a66','#56b6c2','#fff'];
for(let i=0;i<55;i++)ps.push({x:cv.width/2+(Math.random()-.5)*80,y:cv.height*.45,vx:(Math.random()-.5)*15,vy:Math.random()*-17-3,c:cs[Math.floor(Math.random()*cs.length)],w:Math.random()*7+3,h:Math.random()*3+2,r:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.3,g:.35+Math.random()*.2,l:1});
(function a(){cx.clearRect(0,0,cv.width,cv.height);let alive=false;ps.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.rv;p.l-=.013;p.vx*=.99;if(p.l>0){alive=true;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.globalAlpha=Math.min(1,p.l*2);cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore()}});cx.globalAlpha=1;if(alive)requestAnimationFrame(a);else cx.clearRect(0,0,cv.width,cv.height)})()}

/* ═══════ 14. SWIPE & KEYBOARD ═══════ */
let _tx2=0,_ty2=0;
document.addEventListener('touchstart',e=>{_tx2=e.touches[0].clientX;_ty2=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-_tx2,dy=e.changedTouches[0].clientY-_ty2;
if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>55){if(V==='study'&&ST){if(ST.mode==='flip'&&!ST.flip)flipC();else if(ST.mode==='flip'&&ST.flip)grade(dx>0?4:1)}
if(V==='fiche'){const[did,fi]=SU.split(':'),dk=Z.decks.find(d=>d.id===did),i=+fi;if(dk?.fiches){if(dx<0&&i<dk.fiches.length-1)go('fiche',did+':'+(i+1));else if(dx>0&&i>0)go('fiche',did+':'+(i-1))}}}},{passive:true});

document.addEventListener('keydown',e=>{if(ML){if(e.key==='Escape')closeM();return}
if(V==='study'&&ST){if((e.key===' '||e.key==='Enter')&&ST.mode==='flip'&&!ST.flip){e.preventDefault();flipC()}
if(ST.mode==='flip'&&ST.flip){if(e.key==='1')grade(0);if(e.key==='2')grade(3);if(e.key==='3')grade(4);if(e.key==='4')grade(5)}
if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft'&&ST.i>0){ST.i--;ST.flip=false;ST.ans=false;render()}}});

/* ═══════ 15. INIT ═══════ */
(function(){const t=td(),y=new Date(Date.now()-864e5).toISOString().slice(0,10);if(Z.stats.last&&Z.stats.last!==t&&Z.stats.last!==y){Z.stats.streak=0;sv(Z)}})();
render();
addEventListener('resize',()=>{const cv=document.getElementById('confetti');cv.width=innerWidth;cv.height=innerHeight});
</script>
